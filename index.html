<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Ubuntu", Arial, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.75)),
        url("./img/bg.jpg") no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }

    .container {
      min-height: 100vh;
      padding: 28px 14px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
    }

    .site-title {
      text-align: center;
      margin-bottom: 24px;
    }

    .site-title h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .site-title p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .button-list {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .button {
      width: 100%;
      padding: 17px 20px;
      border: none;
      border-left: 6px solid rgba(255, 255, 255, 0.85);
      border-radius: 10px;
      color: white;
      font-family: "Ubuntu", Arial, "Segoe UI", sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
      transition: 0.2s ease;
    }

    .button:hover {
      transform: translateX(5px);
      filter: brightness(1.12);
    }

    .button:active {
      transform: scale(0.99);
    }

    .green {
      background: #15803d;
    }

    .blue {
      background: #1d4ed8;
    }

    .red {
      background: #b91c1c;
      margin-top: 8px;
      border-left-color: #ffd1d1;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.85rem;
      font-weight: 400;
    }

    @media (max-width: 600px) {
      .container {
        align-items: flex-start;
        padding-top: 24px;
      }

      .site-title h1 {
        font-size: 1.65rem;
      }

      .button {
        padding: 15px 16px;
        font-size: 1rem;
      }
    }
  </style>
</head>

</body>
</html>
